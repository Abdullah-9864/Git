<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebDev Learn</title>
  </head>
  <body>
    <!--
      index.html — THE HTML ENTRY POINT

      This is the only HTML file in a React app.
      React takes over the <div id="root"> element below
      and renders everything inside it dynamically.

      The <script> tag loads main.jsx which kicks off React.
      Vite processes this file and injects the right script tags.
    -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
